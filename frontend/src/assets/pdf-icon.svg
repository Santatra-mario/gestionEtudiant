<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Red background (Adobe PDF red) -->
  <rect x="8" y="4" width="48" height="56" rx="6" ry="6" fill="#e53935"/>
  <!-- White folded corner -->
  <path d="M44 4v12h12" fill="#ffffff" opacity="0.4"/>
  <path d="M44 4l12 12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <!-- White diagonal lines representing text -->
  <line x1="18" y1="20" x2="46" y2="20" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="18" y1="28" x2="46" y2="28" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="36" x2="38" y2="36" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <!-- P letter for PDF -->
  <text x="32" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#ffffff">PDF</text>
</svg>
